cyclomatic_complexity:
  ignores_case_statements: true
included:
  - Sources
excluded: 
  - .build
  - Tests
  - "**/R.generated.swift"
  - "**/proto/*.pb.swift"
disabled_rules:
  - todo
  - nesting
  - line_length
  - type_body_length
  - identifier_name
  - file_length
  - force_cast
  - type_name
  - large_tuple
  - function_body_length
  - function_parameter_count
  - cyclomatic_complexity
  - force_try
