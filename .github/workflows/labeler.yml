name: "Issue Labeler"
on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
    - name: Get token
      id: get_token
      uses: actions/create-github-app-token@v2
      with:
        app-id: ${{ secrets.OBS_AUTOMATION_APP_ID }}
        private-key: ${{ secrets.OBS_AUTOMATION_APP_PEM }}
        permission-members: read
        permission-organization-projects: write
        permission-issues: read
    - name: Add agent-ios and agent-mobile labels
      uses: AlexanderWert/issue-labeler@32be4a3c3d8f009c2741af471994337c34b4cb6f  # v2.3
      with:
        repo-token: "${{ secrets.GITHUB_TOKEN }}"
        configuration-path: .github/labeler-config.yml
        enable-versioned-regex: 0
    - name: Check team membership for user
      uses: elastic/get-user-teams-membership@1.1.0
      id: checkUserMember
      with:
        username: ${{ github.actor }}
        team: 'apm'
        usernamesToExclude: |
          dependabot
          dependabot[bot]
          elastic-observability-automation
          elastic-observability-automation[bot]
        GITHUB_TOKEN: ${{ steps.get_token.outputs.token }}
    - name: Show team membership
      run: |
        echo "::debug::isTeamMember: ${{ steps.checkUserMember.outputs.isTeamMember }}"
        echo "::debug::isExcluded: ${{ steps.checkUserMember.outputs.isExcluded }}"
    - name: Add community and triage lables
      if: steps.checkUserMember.outputs.isTeamMember != 'true' && steps.checkUserMember.outputs.isExcluded != 'true'
      uses: AlexanderWert/issue-labeler@32be4a3c3d8f009c2741af471994337c34b4cb6f  # v2.3
      with:
        repo-token: "${{ secrets.GITHUB_TOKEN }}"
        configuration-path: .github/community-label.yml
        enable-versioned-regex: 0
    - name: Assign new internal pull requests to project
      if: (steps.checkUserMember.outputs.isTeamMember == 'true' || steps.checkUserMember.outputs.isExcluded == 'true') && github.event.pull_request
      run: |
        item_id=$(gh project item-add 1674 --url https://github.com/elastic/apm-agent-ios/pull/$PR_NUMBER --owner elastic --format json --jq .id)
        gh project item-edit --id "$item_id" --project-id "$PROJECT_ID" --field-id "$FIELD_ID" --single-select-option-id "$OPTION_ID"
      env:
        MY_GITHUB_TOKEN: ${{ steps.get_token.outputs.token }}
        PROJECT_ID: 'PVT_kwDOAGc3Zs4Am42e'
        FIELD_ID: 'PVTSSF_lADOAGc3Zs4Am42ezgetx6g'
        OPTION_ID: 'f37476bf'
        PR_NUMBER: ${{ github.event.pull_request.number }}
