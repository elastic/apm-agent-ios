name: Warn Release Pull Requests
on:
  pull_request:
    branches:
      - main
    types:
      - opened
jobs:
  Check:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps: 
      - name: check branch name
        id: check-release
        env:
          GITHUB_HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ "${GITHUB_HEAD_REF}" =~ ^rel/([0-9]+\.[0-9]+\.[0-9]+$) ]]; then
            echo "match=true" >> $GITHUB_OUTPUT
          fi
      - name: add comment if PR is release 
        if: steps.check-release.outputs.match == 'true'
        uses: mshick/add-pr-comment@ec328af66588ab8f77cdeb2c264f14aba45bbf59 # v3.12.0
        with:
          message: |
            **WARNING** : This PR will trigger a release and tag when merged.
